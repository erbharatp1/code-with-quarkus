[tools]
java = "17"
maven = "3.8.8"

[tasks.spotless]
run = "./mvnw spotless:check -B"
[tasks.start]
run = "./mvnw quarkus:dev"
[tasks.build]
run = "./mvnw package"
[tasks.test]
run = "./mvnw test"
[tasks.lint]
run = "./mvnw spotless:apply -B"
[tasks.db-start]
run = "docker run --name my-postgres -e POSTGRES_PASSWORD=admin -e POSTGRES_USER=admin -e POSTGRES_DB=admin -p 5433:5432 -d postgres:13"
[tasks.db-stop]
run = "docker stop my-postgres && docker rm my-postgres"
